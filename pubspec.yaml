name: desperate_action
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.35.0
  flame_tiled: ^3.0.10
  flame_forge2d: ^0.19.2+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/tiles/
    - assets/images/Terrain/
    - assets/images/Background/
    - assets/images/Player/
    - assets/images/Enemies/onGround/
    - assets/images/Enemies/jumpingFromEdges/
    - assets/images/FallingPlatform/
    - assets/images/Checkpoints/Checkpoint/
    - assets/images/Checkpoints/Finish/
